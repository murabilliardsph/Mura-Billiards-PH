<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard | Mura Billiards PH</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 30px; }
        .login-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .section { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #222; }
        .order-card { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00c853; }
        h2 { color: #00c853; font-size: 1.2rem; margin-bottom: 15px; }
        input { padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; margin-right: 10px; }
        button { padding: 10px 20px; background: #00c853; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="gate" class="login-gate">
    <div style="text-align:center;">
        <h2>ADMIN SECURE ACCESS</h2>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button onclick="login()">LOGIN</button>
    </div>
</div>

<div id="main" style="display:none;">
    <h1>MURA BILLIARDS PH | CONTROL PANEL</h1>

    <div class="section">
        <h2>CREATE DISCOUNT CODE</h2>
        <input type="text" id="newCode" placeholder="Code (e.g. SALE100)">
        <input type="number" id="newAmt" placeholder="Amount (₱)">
        <button onclick="addPromo()">Create Code</button>
        <div id="promo-list" style="margin-top: 15px; font-size: 13px; color: #888;"></div>
    </div>

    <div class="section">
        <h2>RECENT ORDERS</h2>
        <div id="order-list"></div>
    </div>
</div>

<script>
    // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
            authDomain: "mura-billiards-ph.firebaseapp.com",
            projectId: "mura-billiards-ph",
            storageBucket: "mura-billiards-ph.firebasestorage.app",
            messagingSenderId: "959920092233",
            appId: "1:959920092233:web:d224b24baa4f3284467b98"
        };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        if(document.getElementById('adminPass').value === "mura2026") {
            document.getElementById('gate').style.display = "none";
            document.getElementById('main').style.display = "block";
            loadAdmin();
        } else { alert("Access Denied."); }
    }

    async function addPromo() {
        const code = document.getElementById('newCode').value.toUpperCase();
        const amt = parseInt(document.getElementById('newAmt').value);
        if(!code || !amt) return;
        await db.collection("promos").doc(code).set({ amount: amt });
        alert("Promo Created!");
        loadAdmin();
    }

    function loadAdmin() {
        // Load Promos
        db.collection("promos").onSnapshot(snap => {
            const pl = document.getElementById('promo-list'); pl.innerHTML = "Active Codes: ";
            snap.forEach(doc => { pl.innerHTML += `[${doc.id}: ₱${doc.data().amount}] `; });
        });

        // Load Orders
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const ol = document.getElementById('order-list'); ol.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                ol.innerHTML += `<div class="order-card">
                    <b>${o.customer}</b> (${o.mobile})<br>
                    ${o.address}<br>
                    Items: ${o.items} | DP: <span style="color:#00c853">${o.dp}</span><br>
                    Ref: ${o.ref}
                </div>`;
            });
        });
    }
</script>
</body>
</html>
