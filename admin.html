<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #eee; }
        body { background: var(--dark); color: var(--text); padding: 15px; font-family: sans-serif; }
        .section { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #222; margin-bottom: 15px; }
        .order-card { background: #111; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); font-size: 13px; }
        input, textarea { width: 100%; padding: 10px; margin-top: 8px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; }
        button { background: var(--primary); padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div style="background:var(--card); padding:30px; border-radius:15px; border:1px solid var(--primary); text-align:center;">
            <h3>OWNER LOGIN</h3><input type="password" id="pass" placeholder="Password"><button onclick="check()">ENTER</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="section"><h2>Total DP Revenue: <span id="rev-total" style="color:var(--primary)">₱0</span></h2></div>
        <div class="section"><h3>Recent Orders</h3><div id="order-list"></div></div>
        <div class="section"><h3>Post Review</h3><input id="rName" placeholder="Name"><textarea id="rText" placeholder="Comment"></textarea><button onclick="addR()">Post Review</button></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
            authDomain: "mura-billiards-ph.firebaseapp.com",
            projectId: "mura-billiards-ph",
            storageBucket: "mura-billiards-ph.firebasestorage.app",
            messagingSenderId: "959920092233",
            appId: "1:959920092233:web:d224b24baa4f3284467b98"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function check() { if(document.getElementById('pass').value === "mura2026") { document.getElementById('login-overlay').style.display='none'; document.getElementById('main-content').style.display='block'; } }

        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('order-list');
            let rev = 0; list.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                const dpAmt = parseFloat(o.order_dp?.replace(/[^\d.-]/g, '')) || 0;
                rev += dpAmt;
                list.innerHTML += `
                <div class="order-card">
                    <b>Name:</b> ${o.customer_name}<br>
                    <b>Mobile:</b> ${o.customer_mobile}<br>
                    <b>Addr:</b> ${o.customer_address}<br>
                    <b>Items:</b> ${o.order_items}<br>
                    <b>Ref:</b> ${o.gcash_ref}<br>
                    <b>DP:</b> ${o.order_dp}
                    <button onclick="db.collection('orders').doc('${doc.id}').delete()" style="background:red; color:white; width:auto; padding:3px 10px; margin-top:5px; display:block;">Delete</button>
                </div>`;
            });
            document.getElementById('rev-total').innerText = "₱" + rev.toLocaleString();
        });

        async function addR() {
            const n=document.getElementById('rName').value; const t=document.getElementById('rText').value;
            if(n && t) await db.collection("reviews").add({name:n, comment:t, timestamp:firebase.firestore.FieldValue.serverTimestamp()});
        }
    </script>
</body>
</html>
