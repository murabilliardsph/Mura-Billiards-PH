<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard | Mura Billiards PH</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #eeeeee; }
        body { background: var(--dark); color: var(--text); padding: 20px; font-family: 'Segoe UI', sans-serif; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 999; display: flex; align-items: center; justify-content: center; }
        .section { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #222; margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        input, button { padding: 12px; margin-top: 10px; width: 100%; border-radius: 6px; border: none; }
        input { background: #222; color: white; border: 1px solid #444; }
        .btn-green { background: var(--primary); font-weight: bold; cursor: pointer; }
        .order-card { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary); position: relative; }
        .btn-del { width: auto; background: #ff3d00; color: white; padding: 5px 10px; font-size: 11px; float: right; cursor: pointer; }
        .voucher-pill { background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px solid #333; margin-top: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="text-align: center; background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--primary);">
            <h3>ADMIN ACCESS</h3>
            <input type="password" id="adminPass" placeholder="Enter Password">
            <button class="btn-green" onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <h2 style="color:var(--primary); margin-bottom: 20px;">Mura Billiards PH | Owner Control</h2>

        <div class="admin-grid">
            <div class="section">
                <h3>Voucher Manager</h3>
                <input type="text" id="promoCode" placeholder="Promo Code (e.g. MURA500)">
                <input type="number" id="promoAmount" placeholder="Discount Amount (₱)">
                <button class="btn-green" onclick="createDiscount()">ACTIVATE VOUCHER</button>
                <div id="voucher-list"></div>
            </div>

            <div class="section">
                <h3>Total Revenue (DP Only)</h3>
                <h1 id="total-revenue" style="color:var(--primary); font-size: 3rem;">₱0</h1>
                <p style="font-size: 12px; color: #666;">Calculated from orders in database.</p>
            </div>
        </div>

        <div class="section">
            <h3>Pending Orders</h3>
            <div id="order-list">Loading...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
            authDomain: "mura-billiards-ph.firebaseapp.com",
            projectId: "mura-billiards-ph",
            storageBucket: "mura-billiards-ph.firebasestorage.app",
            messagingSenderId: "959920092233",
            appId: "1:959920092233:web:d224b24baa4f3284467b98"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkLogin() {
            if(document.getElementById('adminPass').value === "mura2026") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Wrong Password!"); }
        }

        async function createDiscount() {
            const code = document.getElementById('promoCode').value.toUpperCase();
            const amt = document.getElementById('promoAmount').value;
            if(!code || !amt) return;
            await db.collection("discounts").doc(code).set({ amount: parseInt(amt) });
            alert("Voucher Activated!");
        }

        // Real-time Vouchers
        db.collection("discounts").onSnapshot(snap => {
            const list = document.getElementById('voucher-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                list.innerHTML += `<div class="voucher-pill">
                    <span>${doc.id} (-₱${doc.data().amount})</span>
                    <span style="color:#ff3d00; cursor:pointer;" onclick="deleteDoc('discounts', '${doc.id}')">Remove</span>
                </div>`;
            });
        });

        // Real-time Orders & Revenue
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('order-list');
            let revenue = 0;
            list.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                const dpNumeric = parseFloat(o.dp_amount.replace(/[^\d.-]/g, '')) || 0;
                revenue += dpNumeric;

                list.innerHTML += `<div class="order-card">
                    <button class="btn-del" onclick="deleteDoc('orders', '${doc.id}')">Delete</button>
                    <p><b>Name:</b> ${o.customer_name}</p>
                    <p><b>Items:</b> ${o.items}</p>
                    <p><b>DP Paid:</b> <span style="color:var(--primary)">${o.dp_amount}</span></p>
                    <p><b>Ref:</b> ${o.ref_no}</p>
                </div>`;
            });
            document.getElementById('total-revenue').innerText = "₱" + revenue.toLocaleString();
        });

        async function deleteDoc(col, id) { if(confirm("Confirm Delete?")) await db.collection(col).doc(id).delete(); }
    </script>
</body>
</html>
