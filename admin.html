<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard | Mura Billiards PH</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #eeeeee; }
        body { background: var(--dark); color: var(--text); padding: 20px; font-family: sans-serif; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); z-index:999; display:flex; align-items:center; justify-content:center; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        .order-card { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .btn-del { background: #ff3d00; color: white; border: none; padding: 5px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="background:#1a1a1a; padding:30px; border-radius:10px; border:1px solid var(--primary);">
        <input type="password" id="adminPass" placeholder="Admin Password" style="padding:10px; width:100%;">
        <button onclick="checkLogin()" style="width:100%; margin-top:10px; padding:10px; background:var(--primary); border:none; font-weight:bold;">LOGIN</button>
    </div>
</div>

<div id="main-content" style="display:none;">
    <h2>Admin Dashboard</h2>
    <div class="section">
        <h3>Total DP Revenue: <span id="total-revenue" style="color:var(--primary)">₱0</span></h3>
    </div>
    <div id="order-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
        authDomain: "mura-billiards-ph.firebaseapp.com",
        projectId: "mura-billiards-ph",
        storageBucket: "mura-billiards-ph.firebasestorage.app",
        messagingSenderId: "959920092233",
        appId: "1:959920092233:web:d224b24baa4f3284467b98"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function checkLogin() {
        if(document.getElementById('adminPass').value === "mura2026") {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        } else { alert("Access Denied"); }
    }

    db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
        const list = document.getElementById('order-list');
        let revenue = 0;
        list.innerHTML = "";
        snap.forEach(doc => {
            const o = doc.data();
            
            // MATH FIX: Strip non-numeric characters (₱ and commas) so JS can add them
            let dpString = o.dp_amount || "0";
            let dpNumeric = parseFloat(dpString.replace(/[^\d.-]/g, '')) || 0;
            revenue += dpNumeric;

            list.innerHTML += `<div class="order-card">
                <button class="btn-del" onclick="deleteDoc('${doc.id}')">Delete</button>
                <p><b>Name:</b> ${o.customer_name}</p>
                <p><b>Address:</b> ${o.address}</p>
                <p><b>Items:</b> ${o.items}</p>
                <p><b>DP Paid:</b> <span style="color:var(--primary)">${o.dp_amount}</span></p>
                <p><b>Ref:</b> ${o.ref_no}</p>
            </div>`;
        });
        document.getElementById('total-revenue').innerText = "₱" + revenue.toLocaleString();
    });

    async function deleteDoc(id) { if(confirm("Delete order?")) await db.collection("orders").doc(id).delete(); }
</script>
</body>
</html>
