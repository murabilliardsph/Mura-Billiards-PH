<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard | Mura Billiards PH</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #eeeeee; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--dark); color: var(--text); padding: 15px; margin: 0; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        h3 { color: var(--primary); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 14px; }
        input, textarea { background: #222; color: white; border: 1px solid #444; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; }
        .order-card { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary); font-size: 13px; }
        .order-card b { color: var(--primary); }
        .btn-del { width: auto; background: #ff3d00; color: white; padding: 5px 10px; font-size: 11px; float: right; }
        .voucher-pill { background: #1a1a1a; padding: 10px; border-radius: 6px; margin-top: 8px; border: 1px solid #333; display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); width: 100%; max-width: 300px;">
            <h3 style="text-align:center">ADMIN</h3>
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="section">
            <h3>Revenue (DP Total)</h3>
            <h1 id="total-revenue" style="color:var(--primary); margin: 10px 0;">₱0</h1>
        </div>

        <div class="section">
            <h3>Voucher Manager</h3>
            <input type="text" id="promoCode" placeholder="Code">
            <input type="number" id="promoAmount" placeholder="Amount (₱)">
            <button onclick="createDiscount()">ACTIVATE</button>
            <div id="voucher-list"></div>
        </div>

        <div class="section">
            <h3>Review Manager</h3>
            <input type="text" id="revName" placeholder="Customer Name">
            <textarea id="revText" placeholder="Review Content"></textarea>
            <button onclick="postReview()">POST REVIEW</button>
            <div id="admin-reviews" style="margin-top:15px; max-height: 200px; overflow-y: auto;"></div>
        </div>

        <div class="section">
            <h3>Customer Orders</h3>
            <div id="order-list">Loading...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
            authDomain: "mura-billiards-ph.firebaseapp.com",
            projectId: "mura-billiards-ph",
            storageBucket: "mura-billiards-ph.firebasestorage.app",
            messagingSenderId: "959920092233",
            appId: "1:959920092233:web:d224b24baa4f3284467b98"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkLogin() {
            if(document.getElementById('adminPass').value === "mura2026") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Wrong Password!"); }
        }

        async function createDiscount() {
            const code = document.getElementById('promoCode').value.toUpperCase();
            const amt = document.getElementById('promoAmount').value;
            if(code && amt) await db.collection("discounts").doc(code).set({ amount: parseInt(amt) });
        }

        async function postReview() {
            const name = document.getElementById('revName').value;
            const comment = document.getElementById('revText').value;
            if(name && comment) await db.collection("reviews").add({ name, comment, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }

        // Live Vouchers
        db.collection("discounts").onSnapshot(snap => {
            const list = document.getElementById('voucher-list');
            list.innerHTML = "";
            snap.forEach(doc => { list.innerHTML += `<div class="voucher-pill"><span>${doc.id} (-₱${doc.data().amount})</span><span onclick="deleteDoc('discounts', '${doc.id}')" style="color:red">Remove</span></div>`; });
        });

        // Live Reviews Manager
        db.collection("reviews").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('admin-reviews');
            list.innerHTML = "";
            snap.forEach(doc => { list.innerHTML += `<div class="voucher-pill"><span>${doc.data().name}</span><span onclick="deleteDoc('reviews', '${doc.id}')" style="color:red">Del</span></div>`; });
        });

        // Live Orders with Full Details
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('order-list');
            let revenue = 0;
            list.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                const dpClean = parseFloat(o.dp.replace(/[^\d.-]/g, '')) || 0;
                revenue += dpClean;

                list.innerHTML += `<div class="order-card">
                    <button class="btn-del" onclick="deleteDoc('orders', '${doc.id}')">Delete</button>
                    <p><b>Name:</b> ${o.name}</p>
                    <p><b>Mobile:</b> ${o.mobile}</p>
                    <p><b>Address:</b> ${o.address}</p>
                    <p><b>Items:</b> ${o.items}</p>
                    <p><b>DP Paid:</b> ${o.dp}</p>
                    <p><b>Ref No:</b> ${o.ref}</p>
                </div>`;
            });
            document.getElementById('total-revenue').innerText = "₱" + revenue.toLocaleString();
        });

        async function deleteDoc(col, id) { if(confirm("Confirm Delete?")) await db.collection(col).doc(id).delete(); }
    </script>
</body>
</html>
