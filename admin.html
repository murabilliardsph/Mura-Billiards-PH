<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Admin | Mura Billiards PH</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #eee; }
        body { background: var(--dark); color: var(--text); padding: 15px; font-family: sans-serif; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; }
        input, textarea { background: #222; color: white; border: 1px solid #444; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; color: black; }
        .order-card { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary); position: relative; }
        .btn-del { width: auto; background: #ff3d00; color: white; padding: 6px 12px; float: right; font-size: 11px; }
        .list-pill { background: #1a1a1a; padding: 10px; border-radius: 6px; margin-top: 8px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); width: 300px; text-align:center;">
            <h3>ADMIN LOGIN</h3>
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="section">
            <h3>Customer Orders (Total Revenue: <span id="total-revenue" style="color:var(--primary)">₱0</span>)</h3>
            <div id="order-list">Loading...</div>
        </div>

        <div class="section">
            <h3>Voucher Manager</h3>
            <input type="text" id="promoCode" placeholder="Promo Code">
            <input type="number" id="promoAmount" placeholder="Discount Amount (₱)">
            <button onclick="addVoucher()">ACTIVATE VOUCHER</button>
            <div id="voucher-list"></div>
        </div>

        <div class="section">
            <h3>Reviews Manager</h3>
            <input type="text" id="revName" placeholder="Customer Name">
            <textarea id="revText" placeholder="Review Content"></textarea>
            <button onclick="addReview()">POST AS 5-STAR</button>
            <div id="admin-reviews"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
            authDomain: "mura-billiards-ph.firebaseapp.com",
            projectId: "mura-billiards-ph",
            storageBucket: "mura-billiards-ph.firebasestorage.app",
            messagingSenderId: "959920092233",
            appId: "1:959920092233:web:d224b24baa4f3284467b98"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkLogin() {
            if(document.getElementById('adminPass').value === "mura2026") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert("Wrong Password!"); }
        }

        async function addVoucher() {
            const c = document.getElementById('promoCode').value.toUpperCase();
            const a = document.getElementById('promoAmount').value;
            if(c && a) await db.collection("discounts").doc(c).set({ amount: parseInt(a) });
        }

        async function addReview() {
            const n = document.getElementById('revName').value;
            const t = document.getElementById('revText').value;
            if(n && t) await db.collection("reviews").add({ name: n, comment: t, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }

        db.collection("discounts").onSnapshot(snap => {
            const list = document.getElementById('voucher-list'); list.innerHTML = "";
            snap.forEach(doc => { list.innerHTML += `<div class="list-pill"><span>${doc.id} (-₱${doc.data().amount})</span><button onclick="delDoc('discounts', '${doc.id}')" style="width:auto; background:red; color:white; padding:4px;">Del</button></div>`; });
        });

        db.collection("reviews").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('admin-reviews'); list.innerHTML = "";
            snap.forEach(doc => { list.innerHTML += `<div class="list-pill"><span>${doc.data().name}</span><button onclick="delDoc('reviews', '${doc.id}')" style="width:auto; background:red; color:white; padding:4px;">Del</button></div>`; });
        });

        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('order-list');
            let revenue = 0; list.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                const dpClean = parseFloat(o.dp?.replace(/[^\d.-]/g, '')) || 0;
                revenue += dpClean;
                list.innerHTML += `<div class="order-card">
                    <button class="btn-del" onclick="delDoc('orders', '${doc.id}')">Delete Order</button>
                    <p><b>Name:</b> ${o.name || 'N/A'}</p>
                    <p><b>Mobile:</b> ${o.mobile || 'N/A'}</p>
                    <p><b>Items:</b> ${o.items || 'N/A'}</p>
                    <p><b>DP Paid:</b> <span style="color:var(--primary)">${o.dp || 'N/A'}</span></p>
                    <p><b>Ref:</b> ${o.ref || 'N/A'}</p>
                    <p style="font-size:11px; color:#888;"><b>Address:</b> ${o.address || 'N/A'}</p>
                </div>`;
            });
            document.getElementById('total-revenue').innerText = "₱" + revenue.toLocaleString();
        });

        async function delDoc(c, i) { if(confirm("Confirm Delete?")) await db.collection(c).doc(i).delete(); }
    </script>
</body>
</html>
