<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Admin Dashboard | Mura Billiards PH</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: var(--text); padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Layout Sections */
        .section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        h3 { margin-bottom: 15px; color: var(--primary); text-transform: uppercase; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        /* Stats Grid */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .stat-box p { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box h2 { color: var(--primary); font-size: 24px; }

        /* Order Cards */
        .card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid var(--primary); position: relative; font-size: 13px; line-height: 1.6; border: 1px solid #222; border-left: 5px solid var(--primary); }
        .info-row { margin-bottom: 4px; }
        .label { color: #777; font-weight: bold; min-width: 80px; display: inline-block; }
        .val { color: #eee; }
        .highlight { color: var(--primary); font-weight: bold; }

        /* Inputs & Buttons */
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; color: #000; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .del-btn { background: #ff4444; color: white; width: auto; font-size: 10px; padding: 5px 10px; position: absolute; right: 10px; top: 10px; border-radius: 5px; border:none; cursor: pointer; z-index: 10; }

        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 90%; max-width: 350px; }

        /* Visitor List */
        #visitor-list { max-height: 200px; overflow-y: auto; font-size: 12px; background: #000; padding: 10px; border-radius: 8px; }
        .visitor-item { padding: 8px 0; border-bottom: 1px solid #222; color: #aaa; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--primary); margin-bottom:20px;">ADMIN ACCESS</h2>
            <input type="password" id="pass" placeholder="Enter Password">
            <button onclick="checkAuth()">Login</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        
        <div class="stat-grid">
            <div class="stat-box">
                <p>Total Revenue (DP)</p>
                <h2 id="rev-total">₱0</h2>
            </div>
            <div class="stat-box">
                <p>Unique Visits</p>
                <h2 id="visit-count">0</h2>
            </div>
        </div>

        <div class="section">
            <h3>Recent Orders</h3>
            <div id="order-list">
                </div>
        </div>

        <div class="section">
            <h3>Post Customer Review</h3>
            <input id="rName" placeholder="Customer Name">
            <textarea id="rText" rows="3" placeholder="Review message..."></textarea>
            <button onclick="addReview()">Post Review</button>
            <div id="admin-reviews-list" style="margin-top:20px;">
                </div>
        </div>

        <div class="section">
            <h3>Voucher Management</h3>
            <div style="display: flex; gap: 10px;">
                <input id="vCode" placeholder="CODE (e.g. SAVE500)" style="margin-top:0;">
                <input id="vAmt" type="number" placeholder="₱ Amount" style="margin-top:0;">
            </div>
            <button onclick="addVoucher()">Create Voucher</button>
            <div id="v-list" style="margin-top:15px;"></div>
        </div>

        <div class="section">
            <h3>Recent Visitors (IP Logs)</h3>
            <div id="visitor-list"></div>
        </div>

    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
            authDomain: "mura-billiards-ph.firebaseapp.com",
            projectId: "mura-billiards-ph",
            storageBucket: "mura-billiards-ph.firebasestorage.app",
            messagingSenderId: "959920092233",
            appId: "1:959920092233:web:d224b24baa4f3284467b98"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Auth Check
        function checkAuth() {
            if(document.getElementById('pass').value === "mura2026") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                alert("Wrong password!");
            }
        }

        // 1. ORDER TRACKER (Fixed for Old & New Buyers)
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('order-list');
            let rev = 0;
            list.innerHTML = "";
            
            snap.forEach(doc => {
                const data = doc.data();
                
                // Compatibility mapping (para sa undefined fields)
                const name = data.customer_name || data.name || 'Unknown';
                const mobile = data.customer_mobile || data.mobile || 'No Number';
                const addr = data.customer_address || data.address || 'No Address';
                const items = data.order_items || data.items || data.product || 'Not Specified';
                const total = data.order_total || data.total || '₱0';
                const dpPaid = data.order_dp || data.dp || '₱0';
                const gcash = data.gcash_ref || data.ref || 'No Ref';

                // Sum up DP for Revenue
                rev += parseFloat(dpPaid.replace(/[^\d]/g, '')) || 0;

                list.innerHTML += `
                <div class="card">
                    <button class="del-btn" onclick="deleteDoc('orders', '${doc.id}')">Delete</button>
                    <div class="info-row"><span class="label">Customer:</span> <span class="highlight">${name}</span></div>
                    <div class="info-row"><span class="label">Contact:</span> <span class="val">${mobile}</span></div>
                    <div class="info-row"><span class="label">Address:</span> <span class="val">${addr}</span></div>
                    <div class="info-row"><span class="label">Ordered:</span> <span class="val" style="color:#ffcc00">${items}</span></div>
                    <div class="info-row"><span class="label">GCash Ref:</span> <span class="val">${gcash}</span></div>
                    <div class="info-row" style="border-top:1px solid #222; margin-top:8px; padding-top:5px;">
                        <span class="label">DP PAID:</span> <span class="highlight">${dpPaid}</span> 
                        <span style="font-size:10px; color:#666; margin-left:10px;">(Full: ${total})</span>
                    </div>
                </div>`;
            });
            document.getElementById('rev-total').innerText = "₱" + rev.toLocaleString();
        });

        // 2. REVIEWS MANAGER
        db.collection("reviews").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('admin-reviews-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                list.innerHTML += `
                <div class="card" style="border-left-color: #ffcc00;">
                    <button class="del-btn" onclick="deleteDoc('reviews', '${doc.id}')">Del</button>
                    <b>${r.name}</b><br>
                    <p style="color:#888; font-size:12px;">${r.comment}</p>
                </div>`;
            });
        });

        async function addReview() {
            const n = document.getElementById('rName').value;
            const t = document.getElementById('rText').value;
            if(!n || !t) return alert("Fill all fields");
            await db.collection("reviews").add({
                name: n, 
                comment: t, 
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('rName').value = "";
            document.getElementById('rText').value = "";
        }

        // 3. VISITOR LOGS
        db.collection("visitors").orderBy("last_visit", "desc").onSnapshot(snap => {
            document.getElementById('visit-count').innerText = snap.size;
            const list = document.getElementById('visitor-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const v = doc.data();
                const time = v.last_visit ? new Date(v.last_visit.seconds * 1000).toLocaleString() : 'Just now';
                list.innerHTML += `
                <div class="visitor-item">
                    <b style="color:var(--primary)">${v.ip}</b><br>
                    ${time} | <span style="font-size:10px; color:#555;">${v.device || ''}</span>
                </div>`;
            });
        });

        // 4. VOUCHERS
        db.collection("discounts").onSnapshot(s => {
            const l = document.getElementById('v-list'); l.innerHTML = "";
            s.forEach(d => {
                l.innerHTML += `
                <div style="display:flex; justify-content:space-between; background:#1a1a1a; padding:10px; border-radius:8px; margin-bottom:5px; border:1px solid #333;">
                    <span><b>${d.id}</b> (-₱${d.data().amount.toLocaleString()})</span>
                    <button onclick="deleteDoc('discounts', '${d.id}')" style="width:auto; margin:0; padding:2px 8px; background:red; color:white;">X</button>
                </div>`;
            });
        });

        async function addVoucher() {
            const c = document.getElementById('vCode').value.toUpperCase().trim();
            const a = document.getElementById('vAmt').value;
            if(!c || !a) return alert("Enter code and amount");
            await db.collection("discounts").doc(c).set({ amount: parseInt(a) });
            document.getElementById('vCode').value = "";
            document.getElementById('vAmt').value = "";
        }

        // Global Delete Function
        async function deleteDoc(col, id) {
            if(confirm("Are you sure you want to delete this?")) {
                await db.collection(col).doc(id).delete();
            }
        }
    </script>
</body>
</html>
