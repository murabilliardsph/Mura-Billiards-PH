<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard | Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #eee; }
        body { background: var(--dark); color: var(--text); padding: 20px; font-family: sans-serif; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        .order-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--primary); position: relative; }
        button { background: var(--primary); padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; color: black; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .list-item { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div style="background:var(--card); padding:40px; border-radius:15px; border:1px solid var(--primary); text-align:center; width: 320px;">
            <h3 style="margin-bottom:15px;">ADMIN LOGIN</h3><input type="password" id="pass" placeholder="Enter Admin Password"><button onclick="check()">LOGIN</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="section">
            <h2 style="margin:0;">Total DP Revenue: <span id="rev-total" style="color:var(--primary)">₱0</span></h2>
            <p style="font-size:12px; color:#666;">Computed from GCash DP submissions</p>
        </div>

        <div class="section">
            <h3>Orders Tracker</h3>
            <div id="order-list">Loading orders...</div>
        </div>

        <div class="section">
            <h3>Voucher & Promo</h3>
            <input id="vCode" placeholder="Promo Code (e.g. MURA500)">
            <input type="number" id="vAmt" placeholder="Discount Amount (₱)">
            <button onclick="addV()">SAVE VOUCHER</button>
            <div id="v-list"></div>
        </div>

        <div class="section">
            <h3>Post Verified Review (5-Star)</h3>
            <input id="rName" placeholder="Customer Name">
            <textarea id="rText" placeholder="Their Comment..."></textarea>
            <button onclick="addR()">POST ⭐⭐⭐⭐⭐ REVIEW</button>
            <div id="r-list"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
            authDomain: "mura-billiards-ph.firebaseapp.com",
            projectId: "mura-billiards-ph",
            storageBucket: "mura-billiards-ph.firebasestorage.app",
            messagingSenderId: "959920092233",
            appId: "1:959920092233:web:d224b24baa4f3284467b98"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function check() { if(document.getElementById('pass').value === "mura2026") { document.getElementById('login-overlay').style.display='none'; document.getElementById('main-content').style.display='block'; } else alert("Access Denied"); }

        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('order-list');
            let rev = 0; list.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                const dpVal = parseFloat(o.order_dp?.replace(/[^\d.-]/g, '')) || 0;
                rev += dpVal;
                list.innerHTML += `
                <div class="order-card">
                    <button onclick="delDoc('orders', '${doc.id}')" style="width:auto; background:red; color:white; padding:5px 10px; float:right;">Delete</button>
                    <b>${o.customer_name}</b> | ${o.customer_mobile}<br>
                    <span style="color:var(--primary); font-weight:bold;">${o.order_items}</span><br>
                    <small>${o.shipping_days}</small><br>
                    DP: ${o.order_dp} | Ref: ${o.gcash_ref}
                </div>`;
            });
            document.getElementById('rev-total').innerText = "₱" + rev.toLocaleString();
        });

        db.collection("discounts").onSnapshot(s => {
            const l=document.getElementById('v-list'); l.innerHTML="";
            s.forEach(d => l.innerHTML+=`<div class="list-item"><span>${d.id} (-₱${d.data().amount})</span> <button onclick="delDoc('discounts','${d.id}')" style="width:auto; padding:4px; background:red; color:white;">Del</button></div>`);
        });

        db.collection("reviews").orderBy("timestamp","desc").onSnapshot(s => {
            const l=document.getElementById('r-list'); l.innerHTML="";
            s.forEach(d => l.innerHTML+=`<div class="list-item"><span>⭐⭐⭐⭐⭐ | <b>${d.data().name}</b></span> <button onclick="delDoc('reviews','${d.id}')" style="width:auto; padding:4px; background:red; color:white;">Del</button></div>`);
        });

        async function addV() { const c=document.getElementById('vCode').value; const a=document.getElementById('vAmt').value; if(c && a) await db.collection("discounts").doc(c.toUpperCase()).set({amount:parseInt(a)}); }
        async function addR() { const n=document.getElementById('rName').value; const t=document.getElementById('rText').value; if(n && t) await db.collection("reviews").add({name:n, comment:t, timestamp:firebase.firestore.FieldValue.serverTimestamp()}); }
        async function delDoc(c,i) { if(confirm("Permanently delete?")) await db.collection(c).doc(i).delete(); }
    </script>
</body>
</html>
