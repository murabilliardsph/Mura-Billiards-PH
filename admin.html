<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #eeeeee; }
        body { background: var(--dark); color: var(--text); padding: 15px; font-family: sans-serif; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; }
        input, textarea { background: #222; color: white; border: 1px solid #444; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; }
        .order-card { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .btn-del { width: auto; background: #ff3d00; color: white; padding: 5px 10px; float: right; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="section">
            <h3>Revenue (DP): <span id="total-revenue" style="color:var(--primary)">₱0</span></h3>
        </div>

        <div class="section">
            <h3>Add Verified Review</h3>
            <input type="text" id="revName" placeholder="Customer Name">
            <textarea id="revText" placeholder="Review Text"></textarea>
            <button onclick="postReview()">POST WITH 5 STARS</button>
            <div id="admin-reviews" style="margin-top:10px;"></div>
        </div>

        <div class="section">
            <h3>Voucher List</h3>
            <input type="text" id="promoCode" placeholder="CODE">
            <input type="number" id="promoAmount" placeholder="Amount">
            <button onclick="createDiscount()">ACTIVATE</button>
            <div id="voucher-list"></div>
        </div>

        <div class="section">
            <h3>All Orders</h3>
            <div id="order-list">Loading...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
            authDomain: "mura-billiards-ph.firebaseapp.com",
            projectId: "mura-billiards-ph",
            storageBucket: "mura-billiards-ph.firebasestorage.app",
            messagingSenderId: "959920092233",
            appId: "1:959920092233:web:d224b24baa4f3284467b98"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function postReview() {
            const name = document.getElementById('revName').value;
            const comment = document.getElementById('revText').value;
            if(name && comment) {
                await db.collection("reviews").add({ name, comment, stars: 5, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                alert("Review Posted!");
            }
        }

        async function createDiscount() {
            const code = document.getElementById('promoCode').value.toUpperCase();
            const amt = document.getElementById('promoAmount').value;
            await db.collection("discounts").doc(code).set({ amount: parseInt(amt) });
        }

        // Live Orders Monitor
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('order-list');
            let revenue = 0;
            list.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                // Match with index.html field names
                const dp = o.dp || "₱0";
                const dpClean = parseFloat(dp.replace(/[^\d.-]/g, '')) || 0;
                revenue += dpClean;

                list.innerHTML += `<div class="order-card">
                    <button class="btn-del" onclick="deleteDoc('orders', '${doc.id}')">Del</button>
                    <p><b>Name:</b> ${o.name}</p>
                    <p><b>Items:</b> ${o.items}</p>
                    <p><b>DP:</b> ${o.dp}</p>
                    <p><b>Ref:</b> ${o.ref}</p>
                    <p><b>Addr:</b> ${o.address}</p>
                </div>`;
            });
            document.getElementById('total-revenue').innerText = "₱" + revenue.toLocaleString();
        });

        async function deleteDoc(col, id) { if(confirm("Delete?")) await db.collection(col).doc(id).delete(); }
    </script>
</body>
</html>
