<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mura Billiards PH | Quality Foldable Tables</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00c853; --dark: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background: var(--dark); color: var(--text); padding-bottom: 80px; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        h1, h2 { font-family: 'Oswald', sans-serif; text-transform: uppercase; text-align: center; color: var(--primary); margin: 20px 0; }
        
        /* Products */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .p-info { padding: 15px; }
        .price { color: var(--primary); font-size: 1.5rem; font-weight: bold; }
        .btn-add { width: 100%; background: var(--primary); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 10px; }

        /* Cart Sidebar */
        #cart { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: #111; z-index: 1001; transition: 0.4s; padding: 20px; border-left: 2px solid var(--primary); }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* Form */
        input, textarea, select { width: 100%; padding: 12px; margin-top: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; }
        .dp-box { background: rgba(0,200,83,0.1); border: 1px dashed var(--primary); padding: 15px; margin: 15px 0; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <h1>🎱 MURA BILLIARDS PH</h1>

    <div class="container">
        <div class="grid">
            <div class="product-card">
                <img src="images/mini-table.jpg" class="product-img">
                <div class="p-info">
                    <h3>Mini Table (120x75cm)</h3>
                    <p class="price">₱1,500</p>
                    <button class="btn-add" onclick="addToCart('Mini Table', 1500, 185)">Add to Cart</button>
                </div>
            </div>
            </div>
    </div>

    <div onclick="openCart()" style="position:fixed; bottom:20px; right:20px; background:var(--primary); padding:15px; border-radius:50px; cursor:pointer; color:black; font-weight:bold;">🛒 Cart (<span id="count">0</span>)</div>

    <div id="cart" style="display:block;"> <h2>Your Order</h2>
        <div id="items-list"></div>
        
        <select id="area" onchange="updateArrival()">
            <option value="">Select Delivery Area</option>
            <option value="Manila">Metro Manila (2-3 Days)</option>
            <option value="Visayas">Visayas (5-7 Days)</option>
            <option value="Mindanao">Mindanao (5-7 Days)</option>
        </select>
        <p id="arrival" style="font-size:12px; color:var(--primary); margin-top:5px;"></p>

        <input type="text" id="promo" placeholder="Discount Code?" onchange="applyPromo()">
        
        <div class="dp-box">
            <p>Shipping Fee: <span id="ship-fee">₱0</span></p>
            <p>Discount: <span id="disc-val">-₱0</span></p>
            <h3 style="margin-top:10px;">Total DP (40%): <span id="dp-total">₱0</span></h3>
        </div>

        <input type="text" id="cName" placeholder="Full Name">
        <input type="text" id="cMobile" placeholder="Mobile Number">
        <textarea id="cAddr" placeholder="Complete Shipping Address"></textarea>
        <input type="text" id="refNo" placeholder="Gcash/Maya Ref Number">
        
        <label style="font-size:10px;"><input type="checkbox" id="terms"> I agree to 40% Non-refundable DP policy.</label>
        
        <button class="btn-add" onclick="placeOrder()">Submit Order</button>
        <button onclick="closeCart()" style="width:100%; background:none; color:#888; border:none; margin-top:10px;">Close</button>
    </div>

    <script>
        // CONFIG FIREBASE DITO
        const firebaseConfig = { apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
  authDomain: "mura-billiards-ph.firebaseapp.com",
  projectId: "mura-billiards-ph",
  storageBucket: "mura-billiards-ph.firebasestorage.app",
  messagingSenderId: "959920092233",
  appId: "1:959920092233:web:d224b24baa4f3284467b98",
  measurementId: "G-T74F3EFP2T" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = [];
        let discount = 0;

        function addToCart(name, price, ship) {
            cart.push({name, price, ship});
            updateUI();
        }

        function updateUI() {
            let subtotal = 0;
            let totalShip = 0;
            cart.forEach(i => { subtotal += i.price; totalShip += i.ship; });
            
            let total = (subtotal + totalShip) - discount;
            let dp = total * 0.40;

            document.getElementById('count').innerText = cart.length;
            document.getElementById('ship-fee').innerText = "₱" + totalShip;
            document.getElementById('dp-total').innerText = "₱" + dp.toLocaleString();
        }

        async function placeOrder() {
            if(!document.getElementById('terms').checked) return alert("Accept terms first!");
            
            const orderData = {
                name: document.getElementById('cName').value,
                mobile: document.getElementById('cMobile').value,
                address: document.getElementById('cAddr').value,
                items: cart.map(i => i.name).join(", "),
                ref: document.getElementById('refNo').value,
                dp_amount: document.getElementById('dp-total').innerText,
                area: document.getElementById('area').value,
                status: "Pending",
                date: new Date().toLocaleString()
            };

            await db.collection("orders").add(orderData);
            alert("Order Submitted! Contact t.me/murabilliardph");
            location.reload();
        }
    </script>
</body>
</html>
