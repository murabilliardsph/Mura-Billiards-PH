<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track My Order | Mura Billiards PH</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00c853; --dark: #0a0a0a; --card: #151515; --text: #ffffff; }
        body { background: var(--dark); color: var(--text); font-family: 'Roboto', sans-serif; display: flex; justify-content: center; padding: 20px; min-height: 100vh; align-items: center; }
        .track-container { max-width: 450px; width: 100%; background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #222; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Oswald', sans-serif; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 1.1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #222; }
        .btn-track { width: 100%; background: var(--primary); color: black; border: none; padding: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 1rem; }
        .btn-track:hover { background: #00e676; transform: translateY(-2px); }
        .btn-track:disabled { background: #555; cursor: not-allowed; }
        #result-box { display: none; margin-top: 30px; text-align: left; padding: 22px; background: #111; border: 1px solid #ffcc00; border-radius: 15px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-label { font-size: 11px; color: #ffcc00; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold; }
        .status-badge { color: var(--primary); font-size: 1.7rem; font-weight: bold; display: block; margin: 8px 0; }
        .info-text { font-size: 14px; color: #ccc; margin-top: 10px; line-height: 1.5; }
        .update-tag { font-size: 11px; color: #555; margin-top: 20px; border-top: 1px solid #222; padding-top: 12px; display: block; }
    </style>
</head>
<body>

<div class="track-container">
    <h1>TRACK ORDER 📦</h1>
    <p style="font-size: 14px; color: #888; margin-bottom: 25px;">Enter your Mobile Number to check status</p>
    
    <input type="text" id="mobileInput" placeholder="e.g. 09123456789" maxlength="11">
    <button class="btn-track" id="trackBtn" onclick="trackNow()">Search Now</button>

    <div id="result-box">
        <span class="status-label">Current Status</span>
        <span id="statusLabel" class="status-badge">---</span>
        
        <div id="statusDetails" class="info-text"></div>
        
        <span class="update-tag">Last Updated: <span id="lastUpdate">---</span></span>
    </div>
    
    <p style="margin-top: 30px; font-size: 11px; color: #444; letter-spacing: 1px;">Mura Billiards PH &copy; 2026</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCYH_a--pEIXJ09NNNymtMibHQv5M6ogL4",
        authDomain: "mura-billiards-ph.firebaseapp.com",
        projectId: "mura-billiards-ph",
        storageBucket: "mura-billiards-ph.firebasestorage.app",
        messagingSenderId: "959920092233",
        appId: "1:959920092233:web:d224b24baa4f3284467b98"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function trackNow() {
        const mobile = document.getElementById('mobileInput').value.trim();
        const btn = document.getElementById('trackBtn');
        const resBox = document.getElementById('result-box');
        const statusLabel = document.getElementById('statusLabel');
        const statusDetails = document.getElementById('statusDetails');
        const lastUpdate = document.getElementById('lastUpdate');

        if(!mobile) { alert("Please enter your mobile number."); return; }

        // Loading State
        btn.innerText = "Searching...";
        btn.disabled = true;
        resBox.style.display = "none";

        try {
            // Simple query to avoid Index requirements
            const q = await db.collection("orders").where("customer_mobile", "==", mobile).get();

            if(q.empty) {
                alert("❌ No order found for: " + mobile + "\n\nPlease make sure the number matches your order details.");
            } else {
                // Get most recent order manually
                const docs = q.docs.sort((a, b) => (b.data().timestamp?.seconds || 0) - (a.data().timestamp?.seconds || 0));
                const data = docs[0].data();
                
                const currentStatus = data.status || "Order Received";
                
                resBox.style.display = "block";
                statusLabel.innerText = currentStatus;
                lastUpdate.innerText = data.status_update || "Pending";

                if(currentStatus === "In Production / Crafting") {
                    statusDetails.innerHTML = "🛠️ <b>Status Update:</b> Your table is now in our workshop. Each part is being carefully handcrafted to ensure the best playing experience.";
                } else if (currentStatus === "Arrived / Delivered") {
                    statusDetails.innerHTML = "✅ <b>Success:</b> Your order has been delivered. Enjoy your game! Don't forget to leave us a review.";
                } else {
                    const reg = data.customer_region || "Luzon";
                    const eta = (reg === "Luzon") ? "1-2 Business Days" : "4-5 Business Days";
                    statusDetails.innerHTML = "🚚 <b>Estimated Delivery:</b> Arrival in " + eta + " to your location in " + reg + ".";
                }
            }
        } catch (err) {
            console.error(err);
            alert("⚠️ Connection error. Please check your internet and try again.");
        } finally {
            btn.innerText = "Search Now";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
